<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Sfondo: scuro a gradiente sottile + accent verde diffuso -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#1a2a23"/>
      <stop offset="55%" stop-color="#0f1714"/>
      <stop offset="100%" stop-color="#070a08"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="56%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#10b981" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="board" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b4750"/>
      <stop offset="100%" stop-color="#212a30"/>
    </linearGradient>
    <linearGradient id="paper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#e4e4e7"/>
    </linearGradient>
    <linearGradient id="clip" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dx="0" dy="14" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background a tutto schermo con corner radius generoso (squircle-like) -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="220" fill="url(#glow)"/>

  <!-- Clipboard: corpo (board) -->
  <g filter="url(#shadow)">
    <rect x="232" y="240" width="560" height="640" rx="56" fill="url(#board)" stroke="#4b5563" stroke-width="3"/>

    <!-- Carta interna -->
    <rect x="284" y="332" width="456" height="496" rx="22" fill="url(#paper)"/>

    <!-- Righe di testo sulla carta -->
    <rect x="332" y="408" width="360" height="22" rx="11" fill="#10b981"/>
    <rect x="332" y="468" width="320" height="16" rx="8" fill="#9ca3af"/>
    <rect x="332" y="510" width="360" height="16" rx="8" fill="#9ca3af"/>
    <rect x="332" y="552" width="240" height="16" rx="8" fill="#d4d4d8"/>

    <rect x="332" y="624" width="360" height="22" rx="11" fill="#10b981"/>
    <rect x="332" y="684" width="320" height="16" rx="8" fill="#9ca3af"/>
    <rect x="332" y="726" width="280" height="16" rx="8" fill="#d4d4d8"/>

    <!-- Clip metallica in alto: base + alette -->
    <rect x="412" y="184" width="200" height="96" rx="22" fill="url(#clip)" stroke="#065f46" stroke-width="3"/>
    <!-- riflesso sottile sulla clip -->
    <rect x="424" y="194" width="176" height="14" rx="7" fill="#ffffff" fill-opacity="0.25"/>
    <!-- foro centrale -->
    <circle cx="512" cy="232" r="14" fill="#0f1714"/>
  </g>
</svg>
