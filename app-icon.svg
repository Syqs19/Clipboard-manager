<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#1a2a23"/>
      <stop offset="60%" stop-color="#0f1714"/>
      <stop offset="100%" stop-color="#070a08"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="56%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background quadrato a corner radius "squircle" -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="220" fill="url(#glow)"/>

  <!-- Clipboard minimal: solo outline + clip pieno, niente dettagli interni -->
  <g fill="none" stroke="#34d399" stroke-width="44" stroke-linejoin="round" stroke-linecap="round">
    <!-- corpo -->
    <rect x="262" y="276" width="500" height="600" rx="60"/>
    <!-- clip -->
    <rect x="402" y="208" width="220" height="116" rx="32" fill="#34d399"/>
  </g>
</svg>
