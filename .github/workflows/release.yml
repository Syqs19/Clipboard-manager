name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      # Strawberry Perl needed to build OpenSSL (required by sqlcipher feature)
      - name: Install Strawberry Perl
        run: choco install strawberryperl -y --no-progress

      - name: Install JS deps
        run: npm ci

      - name: Build + bundle (signed)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build

      - name: Generate latest.json (updater manifest)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $bundleDir = "src-tauri/target/release/bundle"
          # MSI + matching .sig for the updater
          $msi = Get-ChildItem -Path "$bundleDir/msi" -Filter "*.msi" | Select-Object -First 1
          $sig = Get-Content "$($msi.FullName).sig" -Raw -ErrorAction Stop
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/$tag/$($msi.Name)"
          $manifest = @{
            version   = $version
            notes     = "See the release notes on GitHub."
            pub_date  = (Get-Date -AsUTC -Format "yyyy-MM-ddTHH:mm:ss.fffZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $sig.Trim()
                url       = $downloadUrl
              }
            }
          }
          $manifest | ConvertTo-Json -Depth 5 | Out-File "latest.json" -Encoding utf8
          Get-Content "latest.json"

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            latest.json
